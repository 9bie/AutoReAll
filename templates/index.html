<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReJava Web — JAR 反编译工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f35;
            --bg-card-hover: #222845;
            --border: #2a3150;
            --border-glow: #6366f1;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.2);
            --warning: #f59e0b;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-2: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 25% 25%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .bg-grid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridFloat 20s linear infinite;
        }

        @keyframes gridFloat {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.15);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: rgba(139, 92, 246, 0.1);
            bottom: -50px;
            left: -50px;
            animation-delay: -4s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -20px) scale(1.1);
            }
        }

        /* Layout */
        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px var(--accent-glow);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 4px 20px var(--accent-glow);
            }

            50% {
                box-shadow: 0 4px 40px var(--accent-glow), 0 0 60px rgba(99, 102, 241, 0.1);
            }
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.05);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon {
            font-size: 18px;
        }

        /* Dropzone */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .dropzone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
        }

        .dropzone:hover::before,
        .dropzone.dragover::before {
            opacity: 0.03;
        }

        .dropzone-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
            filter: grayscale(0.3);
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        .dropzone:hover .dropzone-icon {
            filter: grayscale(0);
            transform: scale(1.1) translateY(-4px);
        }

        .dropzone-text {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .dropzone-text strong {
            color: var(--accent-light);
            font-weight: 600;
        }

        .dropzone-hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        .file-input {
            display: none;
        }

        /* File info */
        .file-info {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: rgba(99, 102, 241, 0.06);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 10px;
            margin-top: 20px;
            animation: slideIn 0.3s ease;
        }

        .file-info.visible {
            display: flex;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-info-icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .file-info-details {
            flex: 1;
            min-width: 0;
        }

        .file-info-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-info-size {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .file-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .file-remove:hover {
            color: var(--error);
            background: var(--error-glow);
        }

        /* Button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
            width: 100%;
            margin-top: 16px;
        }

        .btn-download:hover {
            background: rgba(16, 185, 129, 0.15);
            box-shadow: 0 4px 16px var(--success-glow);
            transform: translateY(-2px);
        }

        /* Progress */
        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-container.visible {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .progress-pct {
            font-size: 13px;
            color: var(--accent-light);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-bar {
            height: 6px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Status */
        .status-container {
            display: none;
            margin-top: 20px;
        }

        .status-container.visible {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .status-badge.processing {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-light);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .status-badge.success {
            background: var(--success-glow);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-badge.error {
            background: var(--error-glow);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Log output */
        .log-output {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 10px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.7;
            color: #c9d1d9;
            max-height: 320px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-output::-webkit-scrollbar {
            width: 6px;
        }

        .log-output::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-output::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--accent-light);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 24px 16px;
            }

            .card {
                padding: 24px 20px;
            }

            .dropzone {
                padding: 32px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">☕</div>
                <span class="logo-text">ReJava Web</span>
            </div>
            <p class="subtitle">上传 JAR 文件，一键反编译为 Java 源代码</p>
        </div>

        <!-- Upload Card -->
        <div class="card">
            <div class="card-title">
                <span class="icon">📁</span> 上传 JAR 文件
            </div>

            <div class="dropzone" id="dropzone">
                <span class="dropzone-icon">📦</span>
                <p class="dropzone-text">拖拽文件到此处，或 <strong>点击选择</strong></p>
                <p class="dropzone-hint">支持 .jar / .war 文件，最大 2GB</p>
                <input type="file" class="file-input" id="fileInput" accept=".jar,.war">
            </div>

            <div class="file-info" id="fileInfo">
                <span class="file-info-icon">📦</span>
                <div class="file-info-details">
                    <div class="file-info-name" id="fileName"></div>
                    <div class="file-info-size" id="fileSize"></div>
                </div>
                <button class="file-remove" id="fileRemove" title="移除文件">✕</button>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-header">
                    <span class="progress-label">上传进度</span>
                    <span class="progress-pct" id="progressPct">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <button class="btn btn-primary" id="uploadBtn" disabled>
                <span>🚀</span> 开始反编译
            </button>
        </div>

        <!-- Result Card -->
        <div class="card" id="resultCard" style="display:none;">
            <div class="card-title">
                <span class="icon">📋</span> 执行结果
            </div>

            <div class="status-container visible">
                <div class="status-badge" id="statusBadge">
                    <span class="spinner"></span> 处理中...
                </div>
            </div>

            <div class="log-output" id="logOutput"></div>

            <a class="btn btn-download" id="downloadBtn" style="display:none; text-decoration:none;">
                <span>📥</span> 下载反编译结果
            </a>
        </div>

        <div class="footer">
            Powered by IntelliJ ConsoleDecompiler · ReJava Web
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileRemove = document.getElementById('fileRemove');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPct = document.getElementById('progressPct');
        const resultCard = document.getElementById('resultCard');
        const statusBadge = document.getElementById('statusBadge');
        const logOutput = document.getElementById('logOutput');
        const downloadBtn = document.getElementById('downloadBtn');

        let selectedFile = null;

        // Drag & drop
        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        fileRemove.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('visible');
            uploadBtn.disabled = true;
        });

        function handleFile(file) {
            const name = file.name.toLowerCase();
            if (!name.endsWith('.jar') && !name.endsWith('.war')) {
                alert('请选择 .jar 或 .war 文件');
                return;
            }
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);
            fileInfo.classList.add('visible');
            uploadBtn.disabled = false;
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Upload
        uploadBtn.addEventListener('click', () => {
            if (!selectedFile) return;
            uploadFile(selectedFile);
        });

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('jarfile', file);

            const xhr = new XMLHttpRequest();

            // Show progress
            progressContainer.classList.add('visible');
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span> 正在上传...';

            // Show result card with processing status
            resultCard.style.display = 'block';
            statusBadge.className = 'status-badge processing';
            statusBadge.innerHTML = '<span class="spinner"></span> 正在反编译...';
            logOutput.textContent = '等待服务器响应...\n';
            downloadBtn.style.display = 'none';

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = pct + '%';
                    progressPct.textContent = pct + '%';

                    if (pct === 100) {
                        document.querySelector('.progress-label').textContent = '上传完成，反编译中...';
                    }
                }
            });

            xhr.addEventListener('load', () => {
                progressContainer.classList.remove('visible');
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<span>🚀</span> 开始反编译';

                try {
                    const resp = JSON.parse(xhr.responseText);

                    if (resp.success) {
                        statusBadge.className = 'status-badge success';
                        statusBadge.innerHTML = '✅ 反编译成功';
                        logOutput.textContent = resp.log || '完成（无日志输出）';

                        if (resp.downloadUrl) {
                            downloadBtn.href = resp.downloadUrl;
                            downloadBtn.style.display = 'flex';
                        }
                    } else {
                        statusBadge.className = 'status-badge error';
                        statusBadge.innerHTML = '❌ 反编译失败';
                        logOutput.textContent = (resp.error || '未知错误') + '\n\n' + (resp.log || '');
                    }
                } catch (e) {
                    statusBadge.className = 'status-badge error';
                    statusBadge.innerHTML = '❌ 请求失败';
                    logOutput.textContent = '服务器响应异常: ' + xhr.responseText;
                }
            });

            xhr.addEventListener('error', () => {
                progressContainer.classList.remove('visible');
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<span>🚀</span> 开始反编译';
                statusBadge.className = 'status-badge error';
                statusBadge.innerHTML = '❌ 网络错误';
                logOutput.textContent = '无法连接到服务器，请检查网络连接。';
            });

            xhr.open('POST', '/upload');
            xhr.send(formData);
        }
    </script>
</body>

</html>
